<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="photoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
  
  <!-- 外圈光晕 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- 照片框架 1（背景） -->
  <rect x="140" y="160" width="160" height="200" rx="12" fill="url(#photoGradient)" opacity="0.6" transform="rotate(-15 220 260)"/>
  
  <!-- 照片框架 2（前景） -->
  <rect x="212" y="150" width="160" height="200" rx="12" fill="white" opacity="0.95"/>
  
  <!-- 照片内容 - 山和太阳 -->
  <rect x="222" y="160" width="140" height="180" rx="6" fill="#87CEEB"/>
  <circle cx="292" cy="190" r="20" fill="#FFD700" opacity="0.9"/>
  <path d="M 222 260 L 260 210 L 292 240 L 320 200 L 362 260 Z" fill="#4CAF50"/>
  
  <!-- 轮播箭头 -->
  <g transform="translate(256, 380)">
    <!-- 左箭头 -->
    <path d="M -60 0 L -40 -15 L -40 15 Z" fill="white" opacity="0.8"/>
    <!-- 右箭头 -->
    <path d="M 60 0 L 40 -15 L 40 15 Z" fill="white" opacity="0.8"/>
    <!-- 连接线 -->
    <line x1="-35" y1="0" x2="35" y2="0" stroke="white" stroke-width="2" opacity="0.6" stroke-dasharray="4,4"/>
  </g>
  
  <!-- 音符装饰 -->
  <g transform="translate(380, 140)" opacity="0.9">
    <path d="M 0 0 Q 10 -15 20 -10 L 20 30 Q 30 35 30 25 L 30 -15 Q 40 -20 40 -5 L 40 35 Q 40 50 25 50 Q 10 50 10 35 L 10 -5 Q 5 -10 0 0 Z" fill="white" opacity="0.8"/>
    <circle cx="20" cy="40" r="8" fill="white" opacity="0.8"/>
  </g>
  
  <!-- 闪光效果 -->
  <g transform="translate(120, 120)">
    <path d="M 0 -20 L 5 -5 L 20 -5 L 8 5 L 12 20 L 0 10 L -12 20 L -8 5 L -20 -5 L -5 -5 Z" fill="white" opacity="0.6"/>
  </g>
  
  <!-- 底部文字区域背景 -->
  <rect x="156" y="420" width="200" height="50" rx="8" fill="rgba(0,0,0,0.3)"/>
  
  <!-- 插件名称文字 -->
  <text x="256" y="452" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">WALLPAPER</text>
</svg>
